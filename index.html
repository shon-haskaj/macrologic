<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MacroLogic</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg: #000000;
      --fg: #f2f2f2;
      --shadow-1: #9b9b9b;
      --shadow-2: #6f6f6f;
      --shadow-3: #4e4e4e;
      --shadow-4: #2c2c2c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Grotesk', 'Futura', sans-serif;
    }

    .scene {
      perspective: 900px;
    }

    .word {
      --rotateY: 0deg;
      display: flex;
      gap: 0.08em;
      transform-style: preserve-3d;
      transform: rotateY(var(--rotateY));
      cursor: grab;
      user-select: none;
      touch-action: none;
      will-change: transform;
    }

    .word.dragging {
      cursor: grabbing;
    }

    .letter {
      position: relative;
      display: inline-block;
      font-size: clamp(2.5rem, 9vw, 7rem);
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      transform-style: preserve-3d;
      transform: translateZ(0);
    }

    .letter .face {
      position: relative;
      display: inline-block;
      color: var(--fg);
      text-shadow:
        1px 1px 0 var(--shadow-1),
        2px 2px 0 var(--shadow-2),
        3px 3px 0 var(--shadow-3),
        4px 4px 0 var(--shadow-4),
        8px 10px 18px rgba(0, 0, 0, 0.75);
      transform: translateZ(2px);
    }

    .letter .depth {
      position: absolute;
      inset: 0;
      transform: translateZ(var(--z));
      pointer-events: none;
      filter: blur(0.15px);
      opacity: 0.9;
    }

    .letter::after {
      content: attr(data-letter);
      position: absolute;
      inset: 0;
      color: transparent;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.9) 35%, rgba(255, 255, 255, 0) 60%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      mix-blend-mode: screen;
      animation: shine 3.5s ease-in-out infinite;
      transform: translateZ(3px);
      pointer-events: none;
    }

    @keyframes shine {
      0% { background-position: 0% 50%; opacity: 0.4; }
      50% { background-position: 100% 50%; opacity: 0.9; }
      100% { background-position: 0% 50%; opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="word" id="word" aria-label="MacroLogic">
      <span class="letter" data-letter="M">M</span>
      <span class="letter" data-letter="A">A</span>
      <span class="letter" data-letter="C">C</span>
      <span class="letter" data-letter="R">R</span>
      <span class="letter" data-letter="O">O</span>
      <span class="letter" data-letter="L">L</span>
      <span class="letter" data-letter="O">O</span>
      <span class="letter" data-letter="G">G</span>
      <span class="letter" data-letter="I">I</span>
      <span class="letter" data-letter="C">C</span>
    </div>
  </div>
  <script>
    (() => {
      const word = document.getElementById('word');
      const depth = 50;
      const depthStep = 1.6;
      const minShade = 6;
      const maxShade = 30;

      document.querySelectorAll('.letter').forEach((letter) => {
        const char = letter.textContent;
        const face = document.createElement('span');
        face.className = 'face';
        face.textContent = char;
        letter.textContent = '';
        letter.appendChild(face);

        for (let i = 1; i <= depth; i += 1) {
          const slice = document.createElement('span');
          slice.className = 'depth';
          slice.textContent = char;
          slice.style.setProperty('--z', `-${i * depthStep}px`);
          const shade = maxShade - (i / depth) * (maxShade - minShade);
          slice.style.color = `hsl(0 0% ${shade}%)`;
          slice.style.opacity = `${0.85 - (i / depth) * 0.35}`;
          letter.appendChild(slice);
        }
      });

      let isDragging = false;
      let lastX = 0;
      let lastMoveTime = 0;
      let current = 0;
      let velocity = 0;
      let rafId = null;
      let lastTime = 0;
      const speed = 0.4;
      const friction = 0.94;
      const snapStrength = 0.08;
      const snapThreshold = 0.4;
      const stopThreshold = 0.02;

      const setRotate = (value) => {
        current = value;
        word.style.setProperty('--rotateY', `${current}deg`);
      };

      const animate = (time) => {
        if (isDragging) {
          rafId = null;
          lastTime = 0;
          return;
        }

        if (!lastTime) lastTime = time;
        const dt = (time - lastTime) / 16.666;
        lastTime = time;

        velocity *= Math.pow(friction, dt);
        velocity += (-current) * snapStrength;
        current += velocity * dt;
        setRotate(current);

        if (Math.abs(velocity) < stopThreshold && Math.abs(current) < snapThreshold) {
          setRotate(0);
          rafId = null;
          lastTime = 0;
          return;
        }

        rafId = requestAnimationFrame(animate);
      };

      const startInertia = () => {
        if (rafId) return;
        rafId = requestAnimationFrame(animate);
      };

      word.addEventListener('pointerdown', (event) => {
        isDragging = true;
        lastX = event.clientX;
        lastMoveTime = performance.now();
        word.setPointerCapture(event.pointerId);
        word.classList.add('dragging');
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
          lastTime = 0;
        }
      });

      word.addEventListener('pointermove', (event) => {
        if (!isDragging) return;
        const now = performance.now();
        const deltaTime = Math.max(16, now - lastMoveTime);
        const delta = event.clientX - lastX;
        const deltaDegrees = delta * speed;
        current += deltaDegrees;
        velocity = deltaDegrees / (deltaTime / 16.666);
        setRotate(current);
        lastX = event.clientX;
        lastMoveTime = now;
      });

      const stopDrag = (event) => {
        if (!isDragging) return;
        isDragging = false;
        word.classList.remove('dragging');
        if (event && event.pointerId != null) {
          word.releasePointerCapture(event.pointerId);
        }
        startInertia();
      };

      word.addEventListener('pointerup', stopDrag);
      word.addEventListener('pointercancel', stopDrag);
    })();
  </script>
</body>
</html>
